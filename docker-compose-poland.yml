# Company service style: everything mirrors from the shared config root
# ~/docker_ws/ut_nav_p/config (mounted at /config). This service's files live under
# /config/tileserver_godot/. data/styles are mounted to the absolute paths the config JSON
# references (/data, /styles; poland fonts = /styles/fonts), so the config JSON needs no edits.
services:
  tileserver-gl:
    image: maptiler/tileserver-gl
    container_name: tileserver-gl
    network_mode: host
    ports:
      - "8080:80"
    volumes:
      - "$HOME/docker_ws/ut_nav_p/config:/config"
      - "$HOME/docker_ws/ut_nav_p/config/tileserver_godot/data:/data"
      - "$HOME/docker_ws/ut_nav_p/config/tileserver_godot/styles:/styles"
    entrypoint: /config/tileserver_godot/entrypoint.sh
    command: config_file:=/config/tileserver_godot/poland_config.json
    stdin_open: true
    tty: true
    restart: unless-stopped
