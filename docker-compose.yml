# Company service style: everything mirrors from the shared config root
# ~/docker_ws/ut_nav_p/config (mounted at /config). This service's files live under
# /config/tileserver_godot/ (config.json, entrypoint.sh, prune-config.mjs, styles, data).
# data/styles/fonts are mounted to the absolute paths config.json already references (/data,
# /styles, /fonts), so the config JSON itself needs no internal edits.
services:
  tileserver-gl:
    image: maptiler/tileserver-gl
    container_name: tileserver-gl
    network_mode: host
    ports:
      - "8080:80"
    volumes:
      - "$HOME/docker_ws/ut_nav_p/config:/config"
      - "$HOME/docker_ws/ut_nav_p/config/tileserver_godot/data:/data"
      - "$HOME/docker_ws/ut_nav_p/config/tileserver_godot/styles:/styles"
      - "$HOME/docker_ws/ut_nav_p/config/tileserver_godot/styles:/config/styles"
      - "$HOME/docker_ws/ut_nav_p/config/tileserver_godot/styles/fonts:/fonts"
    entrypoint: /config/tileserver_godot/entrypoint.sh
    command: config_file:=/config/tileserver_godot/config.json
    stdin_open: true
    tty: true
    restart: unless-stopped
